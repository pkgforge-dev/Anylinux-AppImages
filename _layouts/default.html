<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="{{ '/site.css' | relative_url }}">
</head>
<body>
  <header>
    <nav aria-label="Main navigation">

        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a></li>

    </nav>

  <main>
    {{ content }}
  </main>
  <footer>
    <p><a href="https://github.com/pkgforge-dev/Anylinux-AppImages">Anylinux-AppImages</a> on GitHub</p>
